            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 입력창 디자인 */
        .input-group label { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 0.8rem; font-weight: 800; color: #475569; }
        select, input { height: 40px !important; font-size: 0.95rem !important; border-radius: 10px !important; border: 1px solid #cbd5e1 !important; width: 100%; transition: all 0.2s; }

            table { min-width: 1000px; }
            th, td { padding: 8px 6px; font-size: 0.8rem; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzis9LmUk7dPEIfEjkdYgAC4NE5H3m3qE",
            authDomain: "my-ai-project-caccd.firebaseapp.com",
            projectId: "my-ai-project-caccd",
            storageBucket: "my-ai-project-caccd.firebasestorage.app",
            messagingSenderId: "1051643051587",
            appId: "1:1051643051587:web:4466258dab96c0c2775ef6",
            measurementId: "G-8W4NDCVEVF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'salary-sim-final-v3';
        
        window.historyRecords = [];
        let currentUser = null;
        let unsubscribeSnap = null;

        const overlay = document.getElementById('loadingOverlay');
        const authSection = document.getElementById('authSection');
        const mainAppSection = document.getElementById('mainAppSection');
        const errorMsg = document.getElementById('authErrorMessage');
        const syncStatus = document.getElementById('syncStatus');

        window.handleGoogleLogin = async () => {
            try {
                overlay.style.display = 'flex';
                errorMsg.innerText = "";
                await signInWithPopup(auth, provider);
            } catch (error) {
                overlay.style.display = 'none';
                console.error("Auth Error:", error.code);
                if(error.code === 'auth/popup-closed-by-user') errorMsg.innerText = "로그인창이 닫혔습니다.";
                else if(error.code === 'auth/unauthorized-domain') errorMsg.innerText = "승인되지 않은 도메인입니다.";
                else errorMsg.innerText = "인증 중 오류가 발생했습니다.";
            }
        };

        window.handleLogout = () => signOut(auth);

        window.updateSyncLabel = (text, type = 'success') => {
            syncStatus.textContent = text;
            if(type === 'loading') syncStatus.className = 'text-[10px] bg-amber-500 text-white px-3 py-0.5 rounded-full font-black';
            else if(type === 'error') syncStatus.className = 'text-[10px] bg-red-500 text-white px-3 py-0.5 rounded-full font-black';
            else syncStatus.className = 'text-[10px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-0.5 rounded-full font-black';
        };

        window.saveDataToCloud = async function() {
            if (!currentUser) return;
            try {
                window.updateSyncLabel('SAVING...', 'loading');
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'salaryData', 'history'), {
                    records: window.historyRecords,
                    updatedAt: new Date().toISOString()
                });
                window.updateSyncLabel('CLOUD SYNCED');
            } catch (error) { console.error(error); window.updateSyncLabel('SYNC ERROR', 'error'); }
        };

        onAuthStateChanged(auth, (user) => {
            overlay.style.display = 'none';
            if (user) {
                currentUser = user;
                authSection.classList.add('hidden');
                mainAppSection.classList.remove('hidden');
                document.getElementById('userDisplay').innerText = user.email;
                
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'salaryData', 'history');
                if (unsubscribeSnap) unsubscribeSnap();
                unsubscribeSnap = onSnapshot(docRef, (snap) => {
                    if (snap.exists() && snap.data().records) {
                        window.historyRecords = snap.data().records;
                    } else {
                        window.historyRecords = [{ year: 2025, month: 12, conditions: "기본값", a: 61898900, c: 0, e: 1200000, f: 23548900, b0: 85000000, total: 86647800 }];
                        window.saveDataToCloud();
                    }
                    window.updateSyncLabel('CLOUD SYNCED');
                    document.getElementById('yearInput').value = window.historyRecords[window.historyRecords.length - 1].year + 1;
                    window.updateSimulation();
                });
            } else {
                currentUser = null;
                if (unsubscribeSnap) unsubscribeSnap();
                mainAppSection.classList.add('hidden');
                authSection.classList.remove('hidden');
            }
        });
    </script>

        const alphaInput = document.getElementById('alphaInput');

        window.updateSimulation = function() {
            if (!window.historyRecords || window.historyRecords.length === 0) return;

                if(g==='A') return a+5; if(g==='B+') return a+2.5; if(g==='B0') return a+1; if(g==='B-') return a-1.5; return 0;
            };
            let totalRate = (getRate(perf, alpha) * 0.5) + (getRate(comp, alpha) * 0.5);
            let multiplier = 1 + (totalRate / 100);
            let nA = Math.floor(last.a * multiplier);
            let nF = Math.floor(last.f * multiplier);
            let nB0 = Math.floor(last.b0 * multiplier);
            let nE = last.e;
            let bRate = 0;
            if(pos==='head'){ bRate = (perf==='A'?38:(perf==='B+'?19:0)); }
            else { bRate = (perf==='A'?19:(perf==='B+'?9:0)); }
            let nC = Math.floor(nA * (bRate/100));
            let nTotal = nA + nC + nE + nF;
            window.currentPreview = { year: nYear, month: nMonth, conditions: `${pos==='head'?'팀장':'부원'}/${perf}/${comp}`, a: nA, c: nC, e: nE, f: nF, b0: nB0, total: nTotal };
            document.getElementById('totalRateText').innerText = totalRate.toFixed(2);
            document.getElementById('bonusRateText').innerText = bRate;
            document.getElementById('increaseAmountText').innerText = (nTotal >= last.total ? "+" : "") + formatCurrency(nTotal - last.total) + "원";
            document.getElementById('monthlyNetText').innerText = formatCurrency(getMonthlyNet(nTotal)) + "원";
            updateUI();
        };

        function updateUI() {
            const body = document.getElementById('tableBody');
            if(!body) return;
            body.innerHTML = '';
            window.historyRecords.forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.className = 'bg-history hover:bg-slate-50 transition-colors';
                tr.innerHTML = `<td>${i+1}</td><td>${r.year}</td><td>${r.month||12}</td><td class="text-slate-500 font-bold">${r.conditions}</td><td class="font-black text-slate-800">${formatCurrency(r.total)}</td><td class="font-black text-emerald-600">${formatCurrency(getMonthlyNet(r.total))}</td><td>${formatCurrency(r.a)}</td><td>${formatCurrency(r.c)}</td><td>${formatCurrency(r.e)}</td><td>${formatCurrency(r.f)}</td><td>${formatCurrency(r.b0)}</td>`;
                body.appendChild(tr);
            });
            if(window.currentPreview){
                const p = window.currentPreview;
                const tr = document.createElement('tr');
                tr.className = 'bg-highlight border-blue-200';
                tr.innerHTML = `<td>${window.historyRecords.length+1}</td><td>${p.year} (예상)</td><td>${p.month}</td><td class="text-blue-600 font-bold">${p.conditions}</td><td class="font-bold text-blue-700">${formatCurrency(p.total)}</td><td class="font-bold text-emerald-600">${formatCurrency(getMonthlyNet(p.total))}</td><td>${formatCurrency(p.a)}</td><td>${formatCurrency(p.c)}</td><td>${formatCurrency(p.e)}</td><td>${formatCurrency(p.f)}</td><td>${formatCurrency(p.b0)}</td>`;
                body.appendChild(tr);
            }
            renderModals();
        }

        function renderModals() {
            const sBody = document.getElementById('modalStaticBody');
            const dBody = document.getElementById('modalDynamicBody');
            if(!sBody || !dBody) return;
            sBody.innerHTML = '';
            staticHistoryData.forEach((d, i) => {
                const tr = document.createElement('tr');
                tr.className = d.color || "bg-white hover:bg-slate-50 transition";
                tr.innerHTML = `<td>${i+1}</td><td class="font-black">${d.year}</td><td>${d.age}</td><td>${d.pos}</td><td>${d.comp}</td><td class="num-cell font-black text-slate-700">${formatCurrency(d.salary)}</td><td class="num-cell font-black text-emerald-600">${formatCurrency(getMonthlyNet(d.salary))}</td><td class="num-cell ${d.inc > 0 ? 'text-blue-600 font-black' : (d.inc < 0 ? 'text-red-500 font-black' : 'text-slate-400')}">${d.inc === 0 ? '-' : (d.inc > 0 ? '+' : '') + formatCurrency(d.inc)}</td>`;
                sBody.appendChild(tr);
            });
            dBody.innerHTML = '';
            for(let i=1; i<window.historyRecords.length; i++){
                const r = window.historyRecords[i];
                const prev = window.historyRecords[i-1];
                const tr = document.createElement('tr');
                tr.className = "bg-emerald-50/40 hover:bg-emerald-100/60 transition border-t-2 border-emerald-100";
                tr.innerHTML = `<td class="text-xs text-emerald-600 font-black">SIM</td><td class="font-black">${r.year}.${r.month}</td><td>${46 + (r.year-2025)}</td><td>-</td><td>DB Inc</td><td class="num-cell font-black text-slate-700">${formatCurrency(r.total)}</td><td class="num-cell font-black text-emerald-600">${formatCurrency(getMonthlyNet(r.total))}</td><td class="num-cell font-black text-blue-600">+${formatCurrency(r.total-prev.total)}</td>`;
                dBody.appendChild(tr);
            }
        }

        let currentCallback = null;
        function showConfirm(msg, callback) {
            document.getElementById('confirmMessage').innerText = msg;
            document.getElementById('confirmModal').classList.remove('hidden');
            currentCallback = callback;
        }
        window.closeConfirm = (result) => {
            document.getElementById('confirmModal').classList.add('hidden');
            if(result && currentCallback) currentCallback();
        }
        document.getElementById('confirmYesBtn').onclick = () => window.closeConfirm(true);

        window.askUndo = () => showConfirm("마지막 시뮬레이션 데이터를 삭제하시겠습니까?", () => {
            if (window.historyRecords.length > 1) {
                window.historyRecords.pop();
                window.saveDataToCloud();
                window.updateSimulation();
            }
        });

        window.askReset = () => showConfirm("데이터를 초기화하고 2025년으로 되돌릴까요?", () => {
            window.historyRecords = [window.historyRecords[0]];
            window.saveDataToCloud();
            window.updateSimulation();
        });

        function updatePerfLabels() {
            let pos = posInput.value;
            const setOptions = (el, type) => {
                el.innerHTML = '';
                ['A','B+','B0','B-','C'].forEach(g => {
                    let opt = document.createElement('option');
                    opt.value = g;
                    let base = g==='A'?'α+5%':g==='B+'?'α+2.5%':g==='B0'?'α+1%':g==='B-'?'α-1.5%':'동결';
                    let bonus = g==='A'?(pos==='head'?'38%':'19%'):g==='B+'?(pos==='head'?'19%':'9%'):'0%';
                    opt.text = type === 'perf' ? `${g} (기본 ${base} / 성과 ${bonus})` : `${g} (${base})`;
                    if(g==='B0') opt.selected = true;
                    el.appendChild(opt);
                });
            };
            setOptions(perfInput, 'perf');
            setOptions(compInput, 'comp');
        }

        window.addRecord = function() {
            if (window.currentPreview) {
                window.historyRecords.push(window.currentPreview);
                window.saveDataToCloud();
                yearInput.value = parseInt(window.currentPreview.year) + 1;
                window.updateSimulation(); 
            }
        };

        window.toggleHistoryModal = () => document.getElementById('historyModal').classList.toggle('hidden');
        [alphaInput, posInput, perfInput, compInput, yearInput, monthInput].forEach(el => el.addEventListener('input', window.updateSimulation));
        posInput.addEventListener('change', () => { updatePerfLabels(); window.updateSimulation(); });
        updatePerfLabels();
    </script>
</body>
</html>
